<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Camano Tide</title>
        <link rel="stylesheet" href="styles.css" />
    </head>
    <body>
        <main class="wrap">
            <div class="banner">
                <span class="emoji">🐣</span>
                <span class="emoji">🌷</span>
                <span class="emoji">🥚</span>
                <span class="emoji">🐇</span>
                <span class="emoji">🪺</span>
                <span class="emoji">🌸</span>
                <span class="emoji">🐣</span>
            </div>

            <p class="kicker">Camano Island, Washington 🐣🌊</p>
            <h1 id="tide-value">--.- ft</h1>
            <p id="tide-status" class="status">Loading tide...</p>
            <p id="tide-next" class="next"></p>

            <div class="egg-row" aria-hidden="true">
                <span>🥚</span>
                <span>🐥</span>
                <span>🥚</span>
                <span>🌷</span>
                <span>🥚</span>
                <span>🐇</span>
                <span>🥚</span>
            </div>

            <p class="meta">
                NOAA tide predictions via station 9448094 (Kayak Point). 💐🐚
            </p>
        </main>

        <script src="script.js"></script>
    </body>
</html>
